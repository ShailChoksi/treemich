name: Docker publish

# Pushes multi-arch (amd64 + arm64) API and web images to Docker Hub when a
# version tag is created (e.g. v0.2.0). The tagged commit must be an ancestor
# of origin/main so releases are only published from mainline history.
#
# Required repo secrets:
#   DOCKERHUB_USERNAME
#   DOCKERHUB_TOKEN     (Docker Hub access token, not your account password)

on:
  push:
    tags:
      - "v*"

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: write # Buildx cache (type=gha)

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag commit is on main history
        run: |
          git fetch origin main
          if ! git merge-base --is-ancestor "${{ github.sha }}" origin/main; then
            echo "Tagged commit is not an ancestor of origin/main; refusing to publish."
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            schoksi/treemich:api-${{ github.ref_name }}
            schoksi/treemich:api-latest
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            schoksi/treemich:web-${{ github.ref_name }}
            schoksi/treemich:web-latest
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web
