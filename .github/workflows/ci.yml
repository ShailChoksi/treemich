name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      IMMICH_BASE_URL: http://host.docker.internal:2283/api
      TREEMICH_ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run prisma:generate -w @treemich/api
      - run: npm run lint
      - run: npm run test
      - run: npm run build
      - run: docker compose config
      - run: docker compose build
