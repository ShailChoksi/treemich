services:
  postgres:
    image: postgres:16
    container_name: treemich-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: treemich
    ports:
      - "54321:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d treemich"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - treemich-postgres:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: treemich-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/treemich
      IMMICH_BASE_URL: ${IMMICH_BASE_URL:-}
      IMMICH_PEOPLE_PAGE_SIZE: ${IMMICH_PEOPLE_PAGE_SIZE:-1000}
      IMMICH_HTTP_TIMEOUT_MS: ${IMMICH_HTTP_TIMEOUT_MS:-8000}
      IMMICH_HTTP_MAX_RETRIES: ${IMMICH_HTTP_MAX_RETRIES:-2}
      IMMICH_HTTP_RETRY_BASE_DELAY_MS: ${IMMICH_HTTP_RETRY_BASE_DELAY_MS:-200}
      TREEMICH_ENCRYPTION_KEY: ${TREEMICH_ENCRYPTION_KEY}
      TREEMICH_ADMIN_PASSWORD: ${TREEMICH_ADMIN_PASSWORD:-treemich-pass!}
      TREEMICH_SESSION_COOKIE_NAME: ${TREEMICH_SESSION_COOKIE_NAME:-treemich_session}
      TREEMICH_COOKIE_SECURE: false
      TREEMICH_SESSION_TTL_MS: ${TREEMICH_SESSION_TTL_MS:-2592000000}
      TREEMICH_TRUST_PROXY: ${TREEMICH_TRUST_PROXY:-false}
      WEB_ORIGIN: ${WEB_ORIGIN:-http://localhost:8080}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-300}
      RATE_LIMIT_TIME_WINDOW_MS: ${RATE_LIMIT_TIME_WINDOW_MS:-60000}
      TREEMICH_GEDCOM_JOB_STALE_AFTER_MS: ${TREEMICH_GEDCOM_JOB_STALE_AFTER_MS:-86400000}
      TREEMICH_EXPORT_MAX_ROWS: ${TREEMICH_EXPORT_MAX_ROWS:-100000}
      TREEMICH_TREE_VALIDATION_MAX_ROWS: ${TREEMICH_TREE_VALIDATION_MAX_ROWS:-50000}
      TREEMICH_PLACES_MAP_MAX_POINTS: ${TREEMICH_PLACES_MAP_MAX_POINTS:-2000}
      # Feature flags: must be passed explicitly; the API container does not read the host repo .env.
      TREEMICH_VALIDATION_ENGINE_ENABLED: ${TREEMICH_VALIDATION_ENGINE_ENABLED:-}
      MAP_UI_ENABLED: ${MAP_UI_ENABLED:-}
      TREEMICH_PROFILE_PLACE_GEOCODING_ENABLED: ${TREEMICH_PROFILE_PLACE_GEOCODING_ENABLED:-}
      TREEMICH_FAMILY_MODEL_ENABLED: ${TREEMICH_FAMILY_MODEL_ENABLED:-}
      TREEMICH_AUTO_PHASE4_FAMILY_BACKFILL: ${TREEMICH_AUTO_PHASE4_FAMILY_BACKFILL:-}
      TREEMICH_GEDCOM_EXPORT_ENABLED: ${TREEMICH_GEDCOM_EXPORT_ENABLED:-}
      TREEMICH_GEDCOM_IMPORT_ENABLED: ${TREEMICH_GEDCOM_IMPORT_ENABLED:-false}
      TREEMICH_MEDIA_STORAGE_DIR: ${TREEMICH_MEDIA_STORAGE_DIR:-/data/media}
      TREEMICH_GEDCOM_MEDIA_MAX_BYTES: ${TREEMICH_GEDCOM_MEDIA_MAX_BYTES:-100000000}
      TREEMICH_GEDCOM_MEDIA_MAX_FILE_BYTES: ${TREEMICH_GEDCOM_MEDIA_MAX_FILE_BYTES:-50000000}
    volumes:
      - treemich-media:/data/media
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: >
      sh -c "npx prisma migrate deploy --schema apps/api/prisma/schema.prisma &&
      npm run start -w @treemich/api"
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: treemich-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "8080:80"

volumes:
  treemich-postgres:
  treemich-media:
